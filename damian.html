<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Damian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Arial Rounded MT Bold', 'Nunito', 'Comic Sans MS', cursive;
    overflow: hidden;
  }
  .name {
    font-size: 20vw;
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 20px rgba(255,255,255,0.5),
      0 0 60px rgba(255,255,255,0.3),
      0 8px 0 rgba(0,0,0,0.15);
    animation: bounce 2s ease-in-out infinite, rainbow 6s linear infinite;
    cursor: default;
    user-select: none;
    letter-spacing: 0.05em;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }
  @keyframes rainbow {
    0%   { color: #ff6b6b; }
    16%  { color: #feca57; }
    33%  { color: #48dbfb; }
    50%  { color: #ff9ff3; }
    66%  { color: #54a0ff; }
    83%  { color: #5f27cd; }
    100% { color: #ff6b6b; }
  }
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    animation: twinkle 1.5s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(0.8); }
    to   { opacity: 1;   transform: scale(1.2); }
  }
  .name { position: relative; z-index: 1; }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="name">Damian</div>
  <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 2 + 's';
      star.style.width = star.style.height = (Math.random() * 4 + 2) + 'px';
      container.appendChild(star);
    }
  </script>
</body>
</html>
